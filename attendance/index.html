<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance — EduSync</title>
<link rel="stylesheet" href="../shared/style.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="overlay" id="overlay"></div>
<nav class="topnav" id="topnav"></nav>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="content">

    <div class="page-eyebrow">Component · Laxman Giri</div>
    <div class="page-title">Attendance Records</div>
    <div class="page-sub">Mark and track daily student attendance.</div>

    <!-- TABS -->
    <div class="att-tabs">
      <button class="att-tab active" id="tab-btn-mark"    onclick="switchTab('mark')">📝 Mark Attendance</button>
      <button class="att-tab"        id="tab-btn-history" onclick="switchTab('history')">📋 History</button>
    </div>

    <!-- MARK PANEL -->
    <div id="panel-mark">
      <div class="card-box">
        <div class="form-row">
          <div class="form-group" style="margin:0">
            <label class="form-label">Select Class</label>
            <select class="form-select" id="markClass"></select>
          </div>
          <div class="form-group" style="margin:0">
            <label class="form-label">Date</label>
            <input class="form-input" type="date" id="markDate">
          </div>
        </div>
        <button class="btn btn-primary" style="margin-top:14px;" onclick="loadStudents()">Load Students</button>
      </div>
      <div id="markArea"></div>
    </div>

    <!-- HISTORY PANEL -->
    <div id="panel-history" style="display:none;">
      <div class="toolbar">
        <div class="search-bar">
          <span>🔍</span>
          <input type="text" id="histSearch" placeholder="Search student name…">
        </div>
        <select class="form-select" id="histStatus" style="width:auto;min-width:130px;">
          <option value="">All Status</option>
          <option value="Present">Present</option>
          <option value="Absent">Absent</option>
          <option value="Late">Late</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>ID</th><th>Student</th><th>Date</th><th>Status</th><th>Remarks</th><th>Marked By</th></tr>
          </thead>
          <tbody id="histBody"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>
<script src="../shared/auth.js"></script>
<script src="script.js"></script>
</body>
</html>
